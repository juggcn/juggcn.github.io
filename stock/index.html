<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>自选股多空看板</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --card2: #1c2333;
    --border: #30363d; --text: #e6edf3; --text2: #8b949e;
    --green: #3fb950; --red: #f85149; --blue: #58a6ff;
    --yellow: #d29922; --pink: #f778ba;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 12px; padding-bottom: 100px;
    -webkit-tap-highlight-color: transparent;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px 10px; flex-wrap: wrap; gap: 8px;
  }
  .header h1 {
    font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 12px;
    cursor: pointer; transition: all .15s; white-space: nowrap;
    user-select: none;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-primary:disabled { opacity: .5; }

  .btn-sm { padding: 3px 8px; font-size: 11px; border-radius: 5px; }
  .btn-danger { background: rgba(248,81,73,.15); color: var(--red); border-color: rgba(248,81,73,.3); }

  .refresh-bar {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: var(--card); border-radius: 10px; margin-bottom: 8px;
    border: 1px solid var(--border); flex-wrap: wrap;
  }
  .refresh-bar label { font-size: 13px; color: var(--text2); }
  .refresh-bar select {
    background: var(--card2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px; font-size: 13px;
  }
  .refresh-indicator {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text2); display: inline-block; margin-left: auto;
    transition: background .3s;
  }
  .refresh-indicator.active { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px; margin-bottom: 6px;
    transition: opacity .3s;
    min-height: 132px; height: 132px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between; height: 38px;
  }
  .card-code { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 5px; }
  .card-code .exch { font-size: 11px; color: var(--text2); font-weight: 400; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-price { text-align: right; }
  .card-price .price { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .card-price .change { font-size: 12px; font-weight: 600; }

  .change-up { color: var(--red); }
  .change-down { color: var(--green); }

  .signal-row {
    display: flex; gap: 4px; margin-bottom: 2px; flex-wrap: nowrap; align-items: center; height: 22px;
  }
  .signal-tag {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 2px 5px; border-radius: 5px; font-size: 11px;
    background: var(--card2); border: 1px solid var(--border);
    white-space: nowrap; flex: 1; justify-content: center;
  }
  .signal-tag.bullish { border-color: var(--red); color: var(--red); }
  .signal-tag.bearish { border-color: var(--green); color: var(--green); }

  .signal-tag.transition { 
    border-color: #ffffff !important; 
    background: rgba(255,255,255,.1) !important;
    box-shadow: 0 0 8px rgba(255,255,255,0.4) inset !important; 
    font-weight: 700; 
    animation: flash .6s ease 3; 
  }
  .signal-tag.bullish.transition { color: var(--red) !important; }
  .signal-tag.bearish.transition { color: var(--green) !important; }
  .signal-tag.buy.transition { color: var(--red) !important; }
  .signal-tag.sell.transition { color: var(--green) !important; }
  .signal-tag.watch.transition { color: var(--yellow) !important; }
  .signal-tag.hold.transition { color: #ffffff !important; }

  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:.35} }

  .signal-operation {
    display: flex; gap: 6px; margin-top: 4px; padding-top: 6px;
    border-top: 1px solid var(--border); align-items: center; justify-content: space-between;
    height: 32px;
  }

  .signal-tag.operation { font-size: 11px; padding: 3px 8px; font-weight: 600; flex: 2; text-align: center; justify-content: center; border-radius: 5px; height: 24px; line-height: 1; }
  .signal-tag.buy { border-color: var(--red); color: var(--red); background: rgba(248,81,73,.15); }
  .signal-tag.sell { border-color: var(--green); color: var(--green); background: rgba(63,185,80,.15); }
  .signal-tag.hold { border-color: #ffffff; color: #ffffff; background: rgba(255,255,255,.1); }
  .signal-tag.watch { border-color: var(--yellow); color: var(--yellow); background: rgba(210,153,34,.15); }

  .signal-operation .signal-tag.watch-signal {
    flex: 1;
    height: 24px;
    padding: 0 4px;
    font-size: 11px;
    font-weight: 600;
    justify-content: center;
    align-items: center;
    line-height: 1;
    display: none;
  }

  .signal-operation .btn-danger { height: 24px; padding: 0 8px; display: inline-flex; align-items: center; }

  .card-body-fallback {
    flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 50px;
  }
  .error-text { font-size: 11px; color: var(--red); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
  .loading-text { font-size: 12px; color: var(--text2); text-align: center; }

  .add-section {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 10px 14px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 8px; align-items: center;
    backdrop-filter: blur(10px); z-index: 100;
  }
  .add-section input {
    flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card2); color: var(--text); font-size: 14px; outline: none;
  }
  .add-section input:focus { border-color: var(--blue); }
  .add-section input::placeholder { color: var(--text2); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 13px; margin-bottom: 4px; }
  .empty-state code { background: var(--card2); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .loading { text-align: center; padding: 40px; color: var(--text2); }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 200;
    background: var(--red); color: #fff; opacity: 0;
    transition: opacity .3s; pointer-events: none;
    max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.info { background: var(--blue); }
  .toast.warn { background: var(--orange); }
</style>
</head>
<body>

<div class="header">
  <h1>📊 自选股多空看板</h1>
  <div class="header-right">
    <button class="btn btn-sm" onclick="refreshAll(true)" id="refreshBtn">🔄</button>
  </div>
</div>

<div class="refresh-bar">
  <label>⏱ 自动:</label>
  <select id="refreshInterval" onchange="setAutoRefresh()">
    <option value="0">关</option>
    <option value="5">5秒</option>
    <option value="10" selected>10秒</option>
    <option value="15">15秒</option>
    <option value="30">30秒</option>
    <option value="60">1分</option>
  </select>
  <span class="refresh-indicator" id="refreshIndicator"></span>
</div>

<div id="content"><div class="loading"><div class="spinner"></div><div>加载中...</div></div></div>

<div class="add-section">
  <input type="text" id="codeInput" placeholder="输入代码，如 sh513180 / 159100" autocomplete="off"
         onkeydown="if(event.key==='Enter')addStock()">
  <button class="btn btn-primary" onclick="addStock()">➕ 添加</button>
</div>

<div class="toast" id="toast"></div>

<script>
// 为了历史回溯，将拉取数据量 lmt 放宽到 250 （约60个交易日）
const REALTIME_SERVERS = [
  { fmt: 'json',   name: '东方财富', url: sym => `https://push2.eastmoney.com/api/qt/stock/get?secid=${toSecId(sym)}&fields=f43,f44,f45,f46,f60,f58,f57` },
  { fmt: 'gbk',    name: '腾讯',   url: sym => `https://qt.gtimg.cn/q=${sym}` },
  { fmt: 'json',   name: '腾讯备',  url: sym => `https://ifzq.gtimg.cn/appstock/app/fqkline/get?param=${sym},day,,,2,qfq` },
  { fmt: 'gb2312', name: '新浪',   url: sym => `https://hq.sinajs.cn/list=${sym}` }
];

const KLINE_SERVERS = [
  { fmt: 'json',  name: '东方财富', url: (s, scale) => `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${toSecId(s)}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=${scale}&fqt=1&end=20500101&lmt=250` },
  { fmt: 'json',  name: '腾讯',   url: (s, scale) => `https://ifzq.gtimg.cn/appstock/app/kline/mkline?param=${s},m${scale},,250` },
  { fmt: 'json',  name: '东方财富不复权', url: (s, scale) => `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${toSecId(s)}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=${scale}&fqt=0&end=20500101&lmt=250` }
];

const KLINE_DAILY_SERVERS = [
  { fmt: 'json', name: '东方财富', url: (s) => `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${toSecId(s)}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt=250` },
  { fmt: 'json', name: '腾讯',   url: (s) => `https://ifzq.gtimg.cn/appstock/app/fqkline/get?param=${s},day,,,250,qfq` },
  { fmt: 'gbk',  name: '网易',   url: (s) => `https://quotes.money.163.com/service/chddata.html?code=${toNetEaseCode(s)}&start=20230101&end=20500101&fields=TCLOSE;HIGH;LOW;TOPEN;VOTURNOVER` }
];

const _klineCache = {}; 
const SERVER_BLACKLIST = {};

function ema(vals, p) {
  if (!vals || vals.length === 0) return [];
  const k = 2/(p+1), r = [vals[0]];
  for (let i = 1; i < vals.length; i++) r.push(vals[i]*k + r[i-1]*(1-k));
  return r;
}

function mt(closes) {
  if (!closes || closes.length === 0) return { mt: [], dir: [] };
  const e = ema(closes, 10), m = ema(e, 10);
  let d = ['red'];
  for (let i = 1; i < m.length; i++) d.push(m[i] >= m[i-1] ? 'red' : 'green');
  return { mt: m, dir: d };
}

function computeMainTrendLine(closes) {
  if (!closes || closes.length < 10) return [];
  return ema(ema(closes, 10), 10);
}

function td_sma(vals, n, m) {
  if (!vals || vals.length === 0) return [];
  const r = [];
  let prev = vals[0];
  for (let i = 0; i < vals.length; i++) {
    const cur = (m * vals[i] + (n - m) * prev) / n;
    r.push(cur);
    prev = cur;
  }
  return r;
}

function getYellowKlineArray(bars) {
  const len = bars.length;
  const rsv = new Float64Array(len);

  for (let i = 0; i < len; i++) {
    const start = Math.max(0, i - 8);
    let hhv = -Infinity;
    let llv = Infinity;

    for (let j = start; j <= i; j++) {
      if (bars[j].high > hhv) hhv = bars[j].high;
      if (bars[j].low < llv) llv = bars[j].low;
    }

    rsv[i] = (hhv === llv) ? 50 : ((bars[i].close - llv) / (hhv - llv)) * 100;
  }

  const hg20 = td_sma(rsv, 3, 1);
  const hg21 = td_sma(hg20, 3, 1);

  const res = new Array(len).fill(false);
  for (let i = 0; i < len; i++) {
    const last_hg20 = hg20[i];
    const last_hg21 = hg21[i];
    const last_hg22 = 3 * last_hg20 - 2 * last_hg21;
    res[i] = last_hg22 > last_hg21;
  }
  return res;
}

function fp(v) { return Math.abs(v) >= 100 ? v.toFixed(2) : v.toFixed(3); }

async function fetchWithTimeout(url, ms = 4000) {
  const ctl = new AbortController();
  const timer = setTimeout(() => ctl.abort(), ms);
  try { return await fetch(url, { signal: ctl.signal }); } finally { clearTimeout(timer); }
}

async function fetchWithFallback(servers, fetchFn) {
  const errors = [];
  const now = Date.now();
  for (const srv of servers) {
    if (srv._dead || (SERVER_BLACKLIST[srv.name] && SERVER_BLACKLIST[srv.name] > now)) continue;
    try {
      return await fetchFn(srv);
    } catch (e) {
      srv._dead = true;
      if (e.name === 'AbortError' || e.message.includes('HTTP')) {
        SERVER_BLACKLIST[srv.name] = now + 60000;
      }
      errors.push(`${srv.name}: ${e.message}`);
    }
  }
  throw new Error('所有源异常: ' + errors.join('; '));
}

function decodeText(buf, charset) {
  try { return new TextDecoder(charset).decode(buf); } catch { return new TextDecoder('utf-8').decode(buf); }
}

function guessExch(code) {
  const c = code.trim();
  if (c.startsWith('sh')||c.startsWith('sz')) return c.slice(0,2);
  if (c.startsWith('5')||c.startsWith('6')||c.startsWith('68')||c.startsWith('11')||c.startsWith('13')) return 'sh';
  return 'sz';
}

function fmtSym(code) {
  code = code.trim().toLowerCase();
  if (code.startsWith('sh')||code.startsWith('sz')) return code;
  return guessExch(code) + code;
}

function toSecId(sym) { return (sym.slice(0,2) === 'sh' ? '1.' : '0.') + sym.slice(2); }

function parseTencentRt(txt) {
  const raw = txt.split('"')[1];
  if(!raw) throw new Error("数据格式错误");
  const p = raw.split('~');
  return { price: parseFloat(p[3]) || 0, yc: parseFloat(p[4]) || 0, name: p[1] || '' };
}

function parseSinaRt(txt) {
  const raw = txt.split('"')[1];
  if(!raw) throw new Error("数据格式错误");
  const p = raw.split(',');
  return { price: parseFloat(p[3]) || 0, yc: parseFloat(p[2]) || 0, name: p[0] || '' };
}

function parseEastMoneyRt(d, sym) {
  if (!d || !d.data) throw new Error('解析空');
  let { f43: p, f60: y, f58: name } = d.data;
  return { price: (p || 0) / 100, yc: (y || 0) / 100, name: name || '' };
}

function parseTencentJsonRt(data) {
  if (!data || data.rc !== 0 || !data.data) throw new Error('解析空');
  const symKey = Object.keys(data.data)[0];
  const arr = data.data[symKey]?.day || data.data[symKey]?.qfqday || [];
  if (arr.length < 2) throw new Error('条数不足');
  const last = arr[arr.length - 1], prev = arr[arr.length - 2];
  return { price: parseFloat(last?.[2] || last?.close || 0), yc: parseFloat(prev?.[2] || prev?.close || 0), name: '' };
}

function parseEmKlines(data) {
  if (!data?.data?.klines) throw new Error('K线空');
  return data.data.klines.map(line => {
    const p = line.split(',');
    return { time: p[0], open: +p[1], close: +p[2], high: +p[3], low: +p[4], volume: parseInt(p[5]) };
  });
}

function formatTencentTime(t) {
  if (typeof t !== 'string') return t;
  if (t.length === 12) return `${t.slice(0,4)}-${t.slice(4,6)}-${t.slice(6,8)} ${t.slice(8,10)}:${t.slice(10,12)}`;
  return t;
}

function parseTencentKlines(sym, data) {
  if (data.rc !== 0 && data.code !== 0) throw new Error('K线异常');
  const quote = data.data?.[sym];
  if (!quote) throw new Error('无数据');
  const arr = Object.values(quote).find(v => Array.isArray(v) && v.length > 0);
  if (!arr) throw new Error('周期空');
  return arr.map(item => {
    if (typeof item === 'string') {
      const p = item.split(/[\/,\s]+/);
      return { time: formatTencentTime(p[0]), open: +p[1], close: +p[2], high: +p[3], low: +p[4], volume: parseInt(p[5]) || 0 };
    }
    const o = Array.isArray(item) ? { time: formatTencentTime(item[0]), open: item[1], close: item[2], high: item[3], low: item[4], volume: item[5] } : item;
    return { time: formatTencentTime(o.time || o.date), open: +o.open, close: +o.close, high: +o.high, low: +o.low, volume: parseInt(o.volume) || 0 };
  });
}

function toNetEaseCode(sym) { return (sym.slice(0, 2) === 'sh' ? '0' : '1') + sym.slice(2); }

function parseNetEaseKlines(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) throw new Error('数据缺失');
  const results = [];
  for (let i = lines.length - 1; i >= 1; i--) {
    const cols = lines[i].split(',');
    if (cols.length < 6) continue;
    const open = +cols[1], high = +cols[2], close = +cols[3], low = +cols[4], vol = parseInt(cols[5]) || 0;
    if (isNaN(open) || isNaN(close)) continue;
    results.push({ time: cols[0], open, high, close, low, volume: vol });
  }
  if (results.length < 22) throw new Error(`链条不足`);
  return results.reverse();
}

const RT_FETCHER = {
  json: async r => r.json(), text: async r => r.text(),
  gbk: async r => decodeText(await r.arrayBuffer(), 'gbk'),
  gb2312: async r => decodeText(await r.arrayBuffer(), 'gb2312')
};
const RT_PARSER = { tencent: parseTencentRt, sina: parseSinaRt, eastmoney: parseEastMoneyRt, tencent_json: parseTencentJsonRt };
const RT_NAME = { '新浪': 'sina', '东方财富': 'eastmoney', '腾讯': 'tencent', '腾讯备': 'tencent_json' };
const KL_NAME = { '东方财富': 'em', '腾讯': 'tencent', '东方财富不复权': 'em', '网易': 'netease' };

async function fetchRealtime(sym) {
  return fetchWithFallback(REALTIME_SERVERS, async (srv) => {
    const r = await fetchWithTimeout(srv.url(sym));
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await RT_FETCHER[srv.fmt](r);
    const key = RT_NAME[srv.name];
    if (key === 'eastmoney') return RT_PARSER[key](data, sym);
    return RT_PARSER[key](data);
  });
}

// ================== 优化点1：K线分级缓存 ==================
async function fetchKline(sym, scale, forceRefresh = false) {
  const cacheKey = `${sym}_${scale}`;
  const now = Date.now();

  // 按照周期长短，设置不同级别的缓存过期时间，极大降低网络请求频率
  let cacheDuration = 8000; 
  if (scale === 101) cacheDuration = 3600000;      // 日线缓存 1 小时
  else if (scale === 60) cacheDuration = 1800000;  // 60分钟线缓存 30 分钟
  else if (scale === 30) cacheDuration = 900000;   // 30分钟线缓存 15 分钟
  else if (scale === 5) cacheDuration = 150000;    // 5分钟线缓存 2.5 分钟

  if (!forceRefresh && _klineCache[cacheKey] && (now - _klineCache[cacheKey].time < cacheDuration)) {
    return _klineCache[cacheKey].data;
  }

  const isDaily = scale === 101;
  const data = await fetchWithFallback(isDaily ? KLINE_DAILY_SERVERS : KLINE_SERVERS, async (srv) => {
    const r = await fetchWithTimeout(srv.url(sym, scale));
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const raw = await (srv.fmt === 'gbk' ? r.arrayBuffer().then(b => decodeText(b, 'gbk')) : srv.fmt === 'text' ? r.text() : r.json());
    const key = KL_NAME[srv.name];
    if (key === 'tencent') return parseTencentKlines(sym, raw);
    if (key === 'netease') return parseNetEaseKlines(raw);
    return parseEmKlines(raw);
  });

  _klineCache[cacheKey] = { time: now, data: data };
  return data;
}

function dirDesc(prev, cur) {
  if (prev === 'green' && cur === 'red')  return { txt: '🟢→🔴', cls: 'bullish', transition: true };
  if (prev === 'red' && cur === 'green')  return { txt: '🔴→🟢', cls: 'bearish', transition: true };
  if (cur === 'red') return { txt: '🔴', cls: 'bullish', transition: false };
  return { txt: '🟢', cls: 'bearish', transition: false };
}

async function getStrategy(sym, forceRefresh = false) {
  const [drLines, m60Lines, m30Lines, m5Lines, rt] = await Promise.all([
    fetchKline(sym, 101, forceRefresh).catch(() => null),
    fetchKline(sym, 60, forceRefresh).catch(() => null),
    fetchKline(sym, 30, forceRefresh).catch(() => null),
    fetchKline(sym, 5, forceRefresh).catch(() => null),
    fetchRealtime(sym)
  ]);

  if (!drLines || drLines.length < 22) throw new Error(`日K线提取不全`);
  if (!m60Lines || m60Lines.length < 22) throw new Error(`60分K线提取不全`);
  if (!m30Lines || m30Lines.length < 22) throw new Error(`30分K线提取不全`);
  if (!m5Lines || m5Lines.length < 22) throw new Error(`5分K线提取不全`);

  let p = rt.price, yc = rt.yc;
  if (p === 0 && yc > 0) p = yc; 

  if (drLines && drLines.length > 0) {
    const basePrice = drLines[drLines.length - 1].close; 
    while (p > basePrice * 5) { p /= 10; }
    while (p < basePrice / 5 && p > 0) { p *= 10; }
    while (yc > basePrice * 5) { yc /= 10; }
    while (yc < basePrice / 5 && yc > 0) { yc *= 10; }
  }

  const pc = yc ? (p - yc) / yc * 100 : 0;

  const dm = mt(drLines.map(r => r.close));
  const m60m = mt(m60Lines.map(r => r.close));
  const m30m = mt(m30Lines.map(r => r.close));
  const m5m = mt(m5Lines.map(r => r.close));

  const dd = dm.dir, md60 = m60m.dir, md30 = m30m.dir, md5 = m5m.dir;
  const d2 = dd[dd.length-2]||dd[dd.length-1], d1 = dd[dd.length-1];
  const m602 = md60[md60.length-2]||md60[md60.length-1], m601 = md60[md60.length-1];
  const m302 = md30[md30.length-2]||md30[md30.length-1], m301 = md30[md30.length-1];
  const m52 = md5[md5.length-2]||md5[md5.length-1], m51 = md5[md5.length-1];

  const drCloses = drLines.map(r => r.close);
  const drTrendArr = computeMainTrendLine(drCloses);
  const drYellowArr = getYellowKlineArray(drLines);

  const m60Closes = m60Lines.map(r => r.close);
  const m60TrendArr = computeMainTrendLine(m60Closes);
  const m60YellowArr = getYellowKlineArray(m60Lines);

  const drTrendLatest = drTrendArr[drTrendArr.length - 1];
  const drTrendPrev = drTrendArr[drTrendArr.length - 2] || 0;
  const _dailyRising = drTrendArr.length >= 2 && (drTrendLatest > drTrendPrev);
  const _dailyYellowVal = drYellowArr[drYellowArr.length - 1];

  const m60TrendLatest = m60TrendArr[m60TrendArr.length - 1] || 0;
  const _m60StandOn = p >= m60TrendLatest; 
  const _m60YellowVal = m60YellowArr[m60YellowArr.length - 1];

  let _opType = 'hold', _opLabel = '⏳ 空仓 (0)', _watch = false;
  if (_dailyRising) {
    // 只要日线主红，底线就是半仓。只有同时满足日线黄K且60分钟站上趋势线，才满仓。
    if (_dailyYellowVal && _m60StandOn) { 
      _opType = 'buy'; 
      _opLabel = '🔴 满仓 (1.0)'; 
    } else { 
      // 包含：黄K且破60分、非黄K且站上60分、非黄K且破60分，全部保持半仓
      _opType = 'sell'; 
      _opLabel = '🟢 半仓 (0.5)'; 
    }

    if (!_m60StandOn && _m60YellowVal) _watch = true;
  } else { _opType = 'hold'; _opLabel = '⏳ 空仓 (0)'; }

  // ================== 优化点2：双指针历史回溯算法 ==================
  const historicalStates = [];
  let dIdx = 0; // 提取日线指针到外层

  for (let i = 0; i < m60Lines.length; i++) {
    const m60Bar = m60Lines[i];
    const dateStr = m60Bar.time.substring(0, 10); 

    // 双指针推进：只要下一根日线的日期还没超过当前60分钟线的日期，日线指针就往后走
    while (dIdx < drLines.length - 1 && drLines[dIdx + 1].time.substring(0, 10) <= dateStr) {
      dIdx++;
    }

    const histDailyRising = dIdx >= 1 && (drTrendArr[dIdx] > drTrendArr[dIdx - 1]);
    const histDailyYellowVal = drYellowArr[dIdx];
    const histM60StandOn = m60Bar.close >= m60TrendArr[i];

    let histOp = 'hold';
    if (histDailyRising) {
      if (histDailyYellowVal) {
        histOp = histM60StandOn ? 'buy' : 'sell';
      } else {
        histOp = histM60StandOn ? 'sell' : 'hold';
      }
    } else {
      histOp = 'hold';
    }
    historicalStates.push({ type: histOp, price: m60Bar.close, time: m60Bar.time });
  }

  let triggerPrice = '---';
  let triggerTime = ''; 
  let currentState = _opType; 

  for (let i = historicalStates.length - 1; i >= 0; i--) {
    if (historicalStates[i].type !== currentState) {
      if (i === historicalStates.length - 1) {
        triggerPrice = fp(p);
        triggerTime = '刚才'; // 盘中实时变动
      } else {
        triggerPrice = fp(historicalStates[i+1].price);
        triggerTime = historicalStates[i+1].time; // 截取下一根（即发生突变的那根K线）的时间
      }
      break;
    }
  }

  // 格式化时间
  if (triggerPrice !== '---') {
    let formattedTime = triggerTime;
    if (triggerTime && triggerTime.length >= 16) {
      formattedTime = triggerTime.substring(5, 16); 
    }
    _opLabel += ` @ ${triggerPrice} (${formattedTime})`;
  }

  return {
    price: p, price_str: fp(p),
    change_pct: pc, change_str: (pc >= 0 ? '+' : '') + pc.toFixed(2) + '%',
    change_icon: pc >= 0 ? '▲' : '▼',
    name: rt.name || '',
    daily: dirDesc(d2, d1),
    m60: dirDesc(m602, m601),
    m30: dirDesc(m302, m301),
    m5: dirDesc(m52, m51),
    operation: { type: _opType, label: _opLabel, transition: _opType !== 'hold' }, 
    watch: _watch
  };
}

const LS_KEY = 'akshare_watchlist_v2'; 
function loadList() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { return []; } }
function saveList(list) { localStorage.setItem(LS_KEY, JSON.stringify(list)); }

let cachedResults = {};
let isRefreshing = false;

function renderCardDOM(item, info) {
  const cardId = `card-${item.sym}`;
  let cardEl = document.getElementById(cardId);

  if (!info) {
    const loadingHtml = `
      <div class="card-header"><div class="card-code">${item.code}</div></div>
      <div class="card-body-fallback"><div class="loading-text">⏳ 正在推演历史回溯...</div></div>
      <div class="signal-operation">
        <span class="signal-tag operation hold">等待中</span>
        <button class="btn btn-sm btn-danger" onclick="removeStock('${item.sym}')">✕ 删除</button>
      </div>`;
    if (!cardEl) {
      cardEl = document.createElement('div'); cardEl.className = 'card'; cardEl.id = cardId;
      document.getElementById('content').appendChild(cardEl);
    }
    cardEl.innerHTML = loadingHtml; return;
  }

  if (info.error) {
    const errorHtml = `
      <div class="card-header"><div class="card-code">${item.code}</div></div>
      <div class="card-body-fallback"><div class="error-text">⚠️ ${info.error}</div></div>
      <div class="signal-operation">
        <span class="signal-tag operation hold" style="border-color:var(--red); color:var(--red);">异常</span>
        <button class="btn btn-sm btn-danger" onclick="removeStock('${item.sym}')">✕ 删除</button>
      </div>`;
    if (!cardEl) {
      cardEl = document.createElement('div'); cardEl.className = 'card'; cardEl.id = cardId;
      document.getElementById('content').appendChild(cardEl);
    }
    cardEl.innerHTML = errorHtml; return;
  }

  const up = info.change_pct >= 0;
  if (!cardEl || cardEl.querySelector('.card-body-fallback')) {
    if (!cardEl) {
      cardEl = document.createElement('div'); cardEl.className = 'card'; cardEl.id = cardId;
      document.getElementById('content').appendChild(cardEl);
    }
    cardEl.innerHTML = `
      <div class="card-header">
        <div class="card-code">${item.code} <span class="exch">${info.name || ''}</span></div>
        <div class="card-price">
          <div class="price">${info.price_str}</div>
          <div class="change ${up?'change-up':'change-down'}">${info.change_icon} ${info.change_str}</div>
        </div>
      </div>
      <div class="signal-row">
        <span class="signal-tag">日 --</span>
        <span class="signal-tag">60分 --</span>
        <span class="signal-tag">30分 --</span>
        <span class="signal-tag">5分 --</span>
      </div>
      <div class="signal-operation">
        <span class="signal-tag operation hold">⏳ 空仓</span>
        <span class="signal-tag watch-signal watch">🟡 关注</span>
        <button class="btn btn-sm btn-danger" onclick="removeStock('${item.sym}')">✕ 删除</button>
      </div>`;
  }

  const priceEl = cardEl.querySelector('.price');
  const changeEl = cardEl.querySelector('.change');
  const exchEl = cardEl.querySelector('.exch');

  if (priceEl && priceEl.textContent !== info.price_str) priceEl.textContent = info.price_str;
  if (exchEl && exchEl.textContent !== info.name) exchEl.textContent = info.name;
  if (changeEl && changeEl.textContent !== `${info.change_icon} ${info.change_str}`) {
    changeEl.textContent = `${info.change_icon} ${info.change_str}`;
    changeEl.className = `change ${up?'change-up':'change-down'}`;
  }

  const updateTagElement = (index, periodData, label) => {
    const row = cardEl.querySelector('.signal-row');
    if (!row) return;
    const span = row.children[index];
    if (!span) return;

    const targetText = `${label} ${periodData.txt}`;
    if (span.textContent !== targetText) span.textContent = targetText;

    let baseClass = `signal-tag ${periodData.cls}`;
    if (periodData.transition) {
      baseClass += ' transition';
      span.className = baseClass.replace(' transition', '');
      void span.offsetWidth; 
    }
    span.className = baseClass;
  };

  updateTagElement(0, info.daily, '日');
  updateTagElement(1, info.m60, '60分');
  updateTagElement(2, info.m30, '30分');
  updateTagElement(3, info.m5, '5分');

  const opRow = cardEl.querySelector('.signal-operation');
  if (opRow && info.operation) {
    const opSpan = opRow.querySelector('.signal-tag.operation');
    if (opSpan) {
      const baseClass = 'signal-tag operation ' + info.operation.type;
      if (info.operation.transition) {
        opSpan.className = baseClass;
        void opSpan.offsetWidth;
      }
      opSpan.className = baseClass + (info.operation.transition ? ' transition' : '');
      opSpan.textContent = info.operation.label;
    }

    const watchEl = opRow.querySelector('.signal-tag.watch-signal');
    if (watchEl) {
      watchEl.style.display = info.watch ? 'inline-flex' : 'none';
    }
  }
}

function render() {
  const el = document.getElementById('content');
  const list = loadList();
  if (list.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <h3>还没有自选品种</h3>
        <p>在底部输入代码添加</p>
        <p style="margin-top:10px;font-size:12px;color:var(--text2)">
          示例: <code>sh513180</code> <code>sz159100</code> <code>000001</code>
        </p>
      </div>`;
    return;
  }

  const currentIds = list.map(it => `card-${it.sym}`);
  Array.from(el.children).forEach(child => {
    if (child.id && !currentIds.includes(child.id)) child.remove();
  });
  if(el.querySelector('.empty-state') || el.querySelector('.loading')) el.innerHTML = '';

  for (const item of list) {
    renderCardDOM(item, cachedResults[item.sym]);
  }
}

async function refreshAll(forceRefresh = false) {
  if (isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.textContent = '⏳';

  const list = loadList();
  const results = {};

  for (const arr of [REALTIME_SERVERS, KLINE_SERVERS, KLINE_DAILY_SERVERS]) {
    for (const srv of arr) delete srv._dead;
  }

  const batchSize = 2; 
  for (let i = 0; i < list.length; i += batchSize) {
    const batch = list.slice(i, i + batchSize);
    await Promise.all(batch.map(async (item) => {
      const sym = item.sym;
      try {
        results[sym] = await getStrategy(sym, forceRefresh);
      } catch (e) {
        results[sym] = { error: e.message || String(e) };
      }
    }));
    if (i + batchSize < list.length) await new Promise(r => setTimeout(r, 100));
  }

  cachedResults = results;
  render();

  btn.disabled = false; btn.textContent = '🔄';
  isRefreshing = false;
}

async function addStock() {
  const input = document.getElementById('codeInput');
  let code = input.value.trim();
  if (!code) return showToast('请输入代码', true);

  const sym = fmtSym(code);
  code = code.toUpperCase();

  const list = loadList();
  if (list.find(it => it.sym === sym)) return showToast('已在自选列表中', true);

  try {
    await getStrategy(sym, true); 
  } catch (e) {
     return showToast('未能通过接口验证: ' + (e.message||String(e)), true);
  }

  list.push({ code, sym });
  saveList(list);
  input.value = '';
  showToast('✅ 已添加', false, 'info');
  await refreshAll(false);
}

function removeStock(sym) {
  let list = loadList();
  list = list.filter(it => it.sym !== sym);
  saveList(list);
  delete cachedResults[sym];
  delete _klineCache[`${sym}_101`]; delete _klineCache[`${sym}_60`];
  delete _klineCache[`${sym}_30`]; delete _klineCache[`${sym}_5`];
  render();
  showToast('已删除', false, 'info');
}

let autoTimer = null;
function setAutoRefresh() {
  const sel = document.getElementById('refreshInterval');
  const interval = parseInt(sel.value);
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  const ind = document.getElementById('refreshIndicator');
  if (interval > 0) {
    ind.classList.add('active');
    autoTimer = setInterval(() => refreshAll(false), interval * 1000); 
  } else {
    ind.classList.remove('active');
  }
}

let toastTimer = null;
function showToast(msg, isError, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' show' : '') + (type === 'info' ? ' show info' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

async function init() {
  let list = loadList();
  let oldKey = localStorage.getItem('akshare_watchlist');
  if (list.length === 0 && oldKey) {
      try {
          const oldList = JSON.parse(oldKey);
          list = oldList.map(it => ({ code: it.code, sym: it.sym }));
          saveList(list);
      } catch(e) {}
  }

  if (list.length > 0) {
    await refreshAll(true);
  } else {
    render();
  }
  setAutoRefresh();
}

init();
</script>
